<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1 class="title">CursorCast</h1>

    <button id="record-btn" class="record-btn">
      <span class="record-dot"></span>
      <span id="btn-label">Record</span>
    </button>

    <div id="timer" class="timer" style="display:none">00:00</div>

    <div class="settings">
      <div class="setting-row">
        <label for="zoom-depth">Zoom</label>
        <select id="zoom-depth">
          <option value="1.5">1.5x</option>
          <option value="2" selected>2x</option>
          <option value="3">3x</option>
        </select>
      </div>

      <div class="setting-row">
        <label for="cursor-toggle">Cursor</label>
        <input type="checkbox" id="cursor-toggle" checked>
      </div>

      <div class="setting-row">
        <label for="cursor-size">Size</label>
        <input type="range" id="cursor-size" min="0.8" max="3.5" step="0.1" value="1.8">
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
